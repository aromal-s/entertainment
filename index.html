<!DOCTYPE html>
<html>
<body>

<audio id="audio" autoplay controls>
    <source src="Voice_Of_Kerala.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");

audio.addEventListener("ended", () => {
    audio.currentTime = 0;
    audio.play();
});
</script>

</body>
</html>
